<!DOCTYPE html>
<html lang="es" data-mode="claro" data-densidad="comoda">
<head>
<meta charset="UTF-8"></meta>
<meta name="viewport" content="width=device-width, initial-scale=1.0"></meta>
<title>ColoColo Football Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com"></link>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"></link>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&amp;family=Barlow+Condensed:wght@500;600;700&amp;display=swap" rel="stylesheet"></link>
<style>
/* ============================================================
   ColoColo Football Center — Sistema visual corporativo
   Blanco dominante · acentos negros · rojo institucional puntual
   ============================================================ */
:root {
  --bg: #F4F4F1;
  --surface: #FFFFFF;
  --surface-2: #FAFAF8;
  --ink: #141414;
  --ink-2: #6E6E6A;
  --ink-3: #9C9C97;
  --border: #E5E5E0;
  --accent: #141414;
  --accent-contrast: #FFFFFF;
  --exito: #1E7A45;
  --alerta: #A87900;
  --rojo: #BE1622;
  --visita: #2A66C4;
  --chart-2: #BE1622;
  --chart-3: #A3A39E;
  --bar-idle: #DCDCD6;
  --scatter-idle: #B9B9B3;
  --campo: #EDEFEA;
  --radius: 14px;
  --pad-card: 24px;
  --pad-page: 28px;
  --gap: 20px;
  --font-ui: 'Barlow', system-ui, sans-serif;
  --font-display: 'Barlow Condensed', 'Barlow', sans-serif;
}
:root[data-densidad="compacta"] { --pad-card: 16px; --pad-page: 18px; --gap: 12px; }
:root[data-mode="oscuro"] {
  --bg: #111110;
  --surface: #1B1B1A;
  --surface-2: #222221;
  --ink: #F0F0EC;
  --ink-2: #A6A6A0;
  --ink-3: #73736E;
  --border: #2E2E2C;
  --accent-contrast: #FFFFFF;
  --bar-idle: #3A3A37;
  --scatter-idle: #5A5A55;
  --campo: #20231F;
}
:root[data-mode="oscuro"][style*="--accent: #141414"] { --accent: #F0F0EC; }

* { box-sizing: border-box; }
html, body { margin: 0; height: 100%; }
body {
  font-family: var(--font-ui);
  background: var(--bg);
  color: var(--ink);
  font-size: 14.5px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
}
#root { height: 100%; }

/* ---------- Shell ---------- */
.cc-shell { display: flex; height: 100vh; overflow: hidden; }
.cc-main-col { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.cc-main { flex: 1; overflow-y: auto; padding: var(--pad-page); }
.cc-page { display: flex; flex-direction: column; gap: var(--gap); max-width: 1180px; margin: 0 auto; }
.cc-foot {
  margin-top: 36px; padding: 18px 4px; border-top: 1px solid var(--border);
  color: var(--ink-3); font-size: 12px; text-align: center;
}

/* ---------- Sidebar ---------- */
.cc-sidebar {
  width: 264px; flex: 0 0 264px; background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; height: 100%;
  transition: transform 0.25s ease;
}
.cc-sidebar-brand {
  display: flex; align-items: center; gap: 12px;
  padding: 18px 18px 16px; border-bottom: 1px solid var(--border);
}
.cc-sidebar-brand-text { display: flex; flex-direction: column; line-height: 1.05; }
.cc-sidebar-brand-text strong {
  font-family: var(--font-display); font-size: 21px; font-weight: 700;
  letter-spacing: 0.02em; text-transform: uppercase;
}
.cc-sidebar-brand-text span {
  font-size: 11px; color: var(--ink-2); letter-spacing: 0.16em; text-transform: uppercase; margin-top: 3px;
}
.cc-nav { flex: 1; overflow-y: auto; padding: 12px 10px; }
.cc-nav ul { list-style: none; margin: 0 0 10px; padding: 0; display: flex; flex-direction: column; gap: 2px; }
.cc-nav-section {
  font-size: 10.5px; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--ink-3); margin: 10px 10px 6px; font-weight: 600;
}
.cc-nav-item {
  position: relative; display: flex; align-items: center; gap: 11px;
  width: 100%; padding: 9px 12px; border: none; background: none;
  border-radius: 10px; cursor: pointer; text-align: left;
  font-family: var(--font-ui); font-size: 13.5px; font-weight: 500; color: var(--ink-2);
  transition: background 0.15s, color 0.15s;
}
.cc-nav-item:hover { background: var(--surface-2); color: var(--ink); }
.cc-nav-item.active { background: var(--accent); color: var(--accent-contrast); font-weight: 600; }
.cc-nav-item.active .cc-icon { color: var(--accent-contrast); }
.cc-nav-indicator { position: absolute; left: -10px; top: 50%; transform: translateY(-50%); width: 3px; height: 0; border-radius: 2px; background: var(--accent); transition: height 0.15s; }
.cc-nav-item.active .cc-nav-indicator { height: 22px; }
.cc-nav-label { white-space: nowrap; }
.cc-sidebar-footer {
  padding: 14px 18px; border-top: 1px solid var(--border);
  font-size: 11.5px; color: var(--ink-3); line-height: 1.5;
}
.cc-sidebar-footer p { margin: 0; }
.cc-sidebar-footer strong { color: var(--ink-2); font-weight: 600; }

/* ---------- Topbar ---------- */
.cc-topbar {
  display: flex; align-items: center; gap: 16px;
  padding: 14px var(--pad-page); background: var(--surface);
  border-bottom: 1px solid var(--border); flex: 0 0 auto;
}
.cc-topbar-title { display: flex; align-items: baseline; gap: 12px; min-width: 0; flex: 0 1 auto; margin-right: auto; }
.cc-topbar-title h1 {
  margin: 0; font-family: var(--font-display); font-size: 23px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.02em; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis; min-width: 0; flex: 1 1 auto;
}
.cc-topbar-title span { font-size: 12px; color: var(--ink-3); letter-spacing: 0.08em; text-transform: uppercase; white-space: nowrap; }
.cc-topbar-right { display: flex; align-items: center; gap: 14px; flex: 0 0 auto; min-width: 0; }
.cc-topbar-user { font-size: 12.5px; color: var(--ink-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 340px; }
.cc-burger { display: none; border: 1px solid var(--border); background: var(--surface); border-radius: 10px; padding: 7px; cursor: pointer; color: var(--ink); }
.cc-scrim { display: none; }

/* ---------- Logos ---------- */
.cc-logo { object-fit: contain; display: block; flex: 0 0 auto; }
.cc-fixture-rival { display: flex; align-items: center; gap: 8px; }
.cc-result-rival { display: flex; align-items: center; gap: 7px; font-size: 13px; font-weight: 600; }
.cc-title-logos { display: flex; align-items: center; gap: 9px; flex-wrap: wrap; }
.cc-title-vs { color: var(--ink-3); font-size: 15px; }
.cc-topbar-liga { display: inline-flex; align-items: center; gap: 7px; flex: 0 0 auto; white-space: nowrap; }
.cc-logo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 10px; }
.cc-logo-cell {
  display: flex; align-items: center; gap: 10px; padding: 9px 12px;
  background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px;
  font-size: 12.5px; font-weight: 600; cursor: pointer; font-family: var(--font-ui);
  color: var(--ink); text-align: left; transition: border-color 0.15s;
}
.cc-logo-cell:hover { border-color: var(--ink-3); }
.cc-logo-cell.sel { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
.cc-logo-manual { display: flex; align-items: flex-end; gap: 12px; flex-wrap: wrap; margin-top: 16px; padding-top: 16px; border-top: 1px dashed var(--border); }

/* ---------- Formulario informe / estrellas ---------- */
.cc-form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 14px; }
.cc-textarea { resize: vertical; font-family: var(--font-ui); }
.cc-input-file { padding: 7px 10px; font-size: 12px; }
.cc-input-mini { padding: 6px 9px; font-size: 12.5px; width: 150px; }
.cc-select-mini { padding: 6px 9px; font-size: 12.5px; width: auto; }
.cc-form-ratings { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; margin-bottom: 14px; }
.cc-form-rating {
  display: flex; flex-direction: column; gap: 5px; padding: 11px 13px;
  background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px;
  font-size: 12px; font-weight: 600; color: var(--ink-2);
}
.cc-estrellas-input { display: inline-flex; gap: 2px; }
.cc-estrellas-input button { background: none; border: none; padding: 1px; cursor: pointer; line-height: 0; }
.cc-estrellas-input .fill { fill: var(--alerta); stroke: var(--alerta); }
.cc-estrellas-input .off { fill: none; stroke: var(--ink-3); }
.cc-form-acciones { display: flex; gap: 10px; align-items: center; }
.cc-scout-pie { display: flex; gap: 8px; justify-content: space-between; }
a.cc-btn-ghost { text-decoration: none; }
.cc-btn-peligro:hover { color: var(--rojo); border-color: var(--rojo); }
.cc-pill-link {
  background: color-mix(in oklab, var(--visita) 13%, transparent); color: var(--visita);
  text-decoration: none; cursor: pointer;
}
.cc-pill-link:hover { text-decoration: underline; }
.cc-pass-cell, .cc-pass-edit { display: flex; align-items: center; gap: 8px; }
.cc-pass-estado { color: var(--ink-2); font-size: 12.5px; }
.cc-login-error { margin: 0; color: var(--rojo); font-size: 12.5px; font-weight: 600; }
.cc-cola-box { margin-top: 14px; padding: 12px 14px; border: 1px dashed var(--border); border-radius: 12px; background: var(--surface-2); }
.cc-cola-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
.cc-cola-head strong { font-size: 13.5px; }
.cc-login-escudo { display: flex; justify-content: center; }

/* ---------- Forma (últimos 5) ---------- */
.cc-forma { display: inline-flex; gap: 4px; }
.cc-forma-dot {
  display: inline-flex; align-items: center; justify-content: center;
  width: 20px; height: 20px; border-radius: 6px;
  font-family: var(--font-display); font-size: 11px; font-weight: 700; color: #fff;
}
.cc-forma-dot.v { background: var(--exito); }
.cc-forma-dot.e { background: var(--alerta); }
.cc-forma-dot.d { background: var(--rojo); }
.cc-forma-vacia { color: var(--ink-3); }
.cc-forma-label { display: inline-flex; align-items: center; gap: 9px; font-size: 12.5px; color: var(--ink-2); font-weight: 600; }

/* ---------- Temporadas / datasets (Configuración) ---------- */
.cc-temporadas { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; margin-bottom: 10px; }
.cc-temporada {
  display: flex; flex-direction: column; gap: 3px; text-align: left;
  background: var(--surface-2); border: 1.5px solid var(--border); border-radius: 13px;
  padding: 16px 18px; cursor: pointer; font-family: var(--font-ui); color: var(--ink);
}
.cc-temporada strong { font-family: var(--font-display); font-size: 24px; font-weight: 700; }
.cc-temporada span { font-size: 12.5px; color: var(--ink-2); }
.cc-temporada-detalle { font-size: 11.5px !important; color: var(--ink-3) !important; }
.cc-temporada.activa { border-color: var(--accent); background: var(--surface); box-shadow: 0 0 0 1px var(--accent); }
.cc-temporada.deshabilitada { opacity: 0.55; cursor: not-allowed; }
.cc-datasets { display: flex; flex-direction: column; gap: 12px; }
.cc-dataset {
  display: grid; grid-template-columns: 44px 1fr auto; gap: 14px; align-items: center;
  background: var(--surface-2); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px;
}
.cc-dataset-icono {
  width: 44px; height: 44px; border-radius: 11px; background: var(--accent); color: var(--accent-contrast);
  display: flex; align-items: center; justify-content: center;
}
.cc-dataset-info { display: flex; flex-direction: column; gap: 3px; }
.cc-dataset-info strong { font-size: 14px; }
.cc-dataset-info span { font-size: 12.5px; color: var(--ink-2); }
.cc-dataset-estado { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
.cc-dataset-detalle { font-size: 11.5px; color: var(--ink-3); text-align: right; }

/* ---------- Selector jugador (comparación) ---------- */
.cc-selector-jugador { display: flex; gap: 12px; flex-wrap: wrap; }

/* ---------- Acciones de jugadores (nuevo) ---------- */
.cc-player-actions { display: flex; flex-direction: column; gap: 12px; }
.cc-actions-head { display: flex; flex-direction: column; gap: 8px; }
.cc-actions-selector { display: flex; gap: 12px; }
.cc-actions-selector label { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 13px; font-weight: 600; color: var(--ink-2); transition: color 0.2s; }
.cc-actions-selector input[type="radio"] { cursor: pointer; }
.cc-actions-selector input[type="radio"]:checked + .cc-radio-label { color: var(--ink); }
.cc-radio-label { display: flex; align-items: center; gap: 6px; }
.cc-players-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
.cc-player-card { padding: 12px 14px; border: 1px solid var(--border); border-radius: 10px; background: var(--surface); cursor: pointer; transition: all 0.2s; }
.cc-player-card:hover { background: var(--surface-2); border-color: var(--ink-3); }
.cc-player-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.cc-player-info { display: flex; flex-direction: column; gap: 3px; }
.cc-player-info strong { font-size: 14px; color: var(--ink); }
.cc-player-pos { font-size: 11px; color: var(--ink-3); text-transform: uppercase; font-weight: 600; letter-spacing: 0.04em; }
.cc-player-dorsal { font-family: var(--font-display); font-size: 18px; font-weight: 700; color: var(--ink-3); }
.cc-player-stats { display: flex; gap: 10px; font-size: 12px; color: var(--ink-2); }
.cc-player-detail { padding: 10px 0; border-top: 1px dashed var(--border); margin-top: 8px; display: flex; flex-direction: column; gap: 6px; }
.cc-detail-row { display: grid; grid-template-columns: 1fr 40px; gap: 8px; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 12.5px; align-items: center; }
.cc-detail-row:last-child { border-bottom: none; }
.cc-gol { background: var(--rojo); color: white; padding: 2px 6px; border-radius: 4px; font-weight: 700; font-size: 11px; }

/* ---------- Shotmap v2 (estilo mplsoccer, tamaño fijo) ---------- */
.cc-shotmap2 { width: 380px; max-width: 100%; margin: 0 auto; }
.cc-shotmap2-svg { width: 380px; max-width: 100%; height: auto; display: block; border-radius: 8px; }
.cc-shotmap2-tip { min-height: 44px; margin-top: 10px; padding: 9px 13px; background: #1a1a1a; border-radius: 8px; color: #E2E8F0; font-size: 13px; display: flex; align-items: center; }
.cc-shotmap2-tiprow { display: flex; justify-content: space-between; gap: 10px; width: 100%; align-items: center; }
.cc-shotmap2-tiprow strong { color: #fff; }
.cc-shotmap2-tiprow span { color: #B6C0CC; text-align: right; }
.cc-shotmap2-empty { color: #8A93A0; }
.cc-shotmap2-legend { display: flex; gap: 16px; margin-top: 10px; font-size: 12px; color: var(--ink-2); flex-wrap: wrap; align-items: center; justify-content: center; }
.cc-shotmap2-dot { display: inline-flex; align-items: center; gap: 5px; }
.cc-shotmap2-size { margin-left: auto; color: var(--ink-3); }
@media (max-width: 480px) { .cc-shotmap2, .cc-shotmap2-svg { width: 100%; } .cc-shotmap2-size { margin-left: 0; } }

/* ---------- Comparación de Equipos (rediseño) ---------- */
.cc-h2h { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 20px; }
.cc-h2h-team { display: flex; flex-direction: column; align-items: center; gap: 8px; text-align: center; }
.cc-h2h-team > strong { font-family: var(--font-display); font-size: 18px; }
.cc-h2h-wins { font-size: 12px; color: var(--ink-2); }
.cc-h2h-pj { font-size: 11.5px; font-weight: 600; color: var(--ink-3); }
.cc-h2h-center { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.cc-h2h-score { display: flex; align-items: baseline; gap: 10px; font-family: var(--font-display); font-size: 44px; font-weight: 700; line-height: 1; }
.cc-h2h-score .a { color: var(--accent); }
.cc-h2h-score .b { color: var(--chart-2); }
.cc-h2h-dash { color: var(--ink-3); font-size: 30px; }
.cc-h2h-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-3); font-weight: 600; }
.cc-h2h-metric { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; box-shadow: 0 1px 2px rgba(20,20,20,0.04), 0 2px 8px rgba(20,20,20,0.035); }
.cc-h2h-metric-name { font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--ink-2); font-weight: 600; }
.cc-h2h-metric-vals { display: flex; justify-content: space-between; font-family: var(--font-display); font-size: 22px; font-weight: 700; margin: 6px 0 8px; }
.cc-h2h-metric-vals span:first-child { color: var(--ink-3); }
.cc-h2h-metric-vals span:last-child { color: var(--ink-3); }
.cc-h2h-metric-vals span.win { color: var(--rojo); }
.cc-h2h-metric-bar { display: flex; height: 6px; border-radius: 4px; overflow: hidden; background: var(--surface-2); }
.cc-h2h-metric-bar .a { background: var(--accent); }
.cc-h2h-metric-bar .b { background: var(--chart-2); }
.cc-comp-cuerpo { align-items: start; }
.cc-comp-rows { display: flex; flex-direction: column; gap: 11px; }
.cc-comp-row { display: grid; grid-template-columns: 54px 1fr 54px; align-items: center; gap: 12px; }
.cc-comp-val { font-family: var(--font-display); font-size: 16px; font-weight: 700; color: var(--ink-3); text-align: center; }
.cc-comp-val.win { color: var(--rojo); }
.cc-comp-mid { display: flex; flex-direction: column; gap: 5px; }
.cc-comp-name { font-size: 12px; color: var(--ink-2); text-align: center; }
.cc-comp-track { display: flex; height: 8px; border-radius: 5px; overflow: hidden; background: var(--surface-2); }
.cc-comp-track .a { background: var(--accent); }
.cc-comp-track .b { background: var(--chart-2); }
@media (max-width: 860px) { .cc-h2h { grid-template-columns: 1fr; gap: 14px; } .cc-comp-cuerpo { grid-template-columns: 1fr; } }

/* ---------- Mapa de acciones de jugador ---------- */
.cc-acc-controls { display: flex; align-items: flex-end; gap: 20px; flex-wrap: wrap; margin: 4px 0 14px; }
.cc-acc-playerline { display: flex; align-items: center; gap: 11px; }
.cc-acc-playerline > div { display: flex; flex-direction: column; }
.cc-acc-playerline strong { font-size: 15px; color: var(--ink); }
.cc-acc-playerline span { font-size: 12px; color: var(--ink-2); }
.cc-acc-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
.cc-acc-chip { display: inline-flex; align-items: center; gap: 6px; padding: 5px 11px; border-radius: 999px; background: var(--surface-2); border: 1px solid var(--border); font-size: 12px; color: var(--ink-2); cursor: pointer; transition: all 0.15s ease; }
.cc-acc-chip:hover { border-color: var(--ink-3); }
.cc-acc-chip.activo { background: var(--rojo); border-color: var(--rojo); color: #fff; }
.cc-acc-chip.activo strong { color: #fff; }
.cc-acc-chip strong { font-family: var(--font-display); font-size: 14px; color: var(--rojo); }
/* Acciones de jugador · panel de estadísticas reales */
.cc-acc-rating { display: inline-flex; align-items: center; justify-content: center; min-width: 38px; height: 26px; padding: 0 8px; border-radius: 8px; background: #141414; color: #fff; font-weight: 800; font-size: 13px; margin-left: 8px; }
.cc-acc-rating.alto { background: var(--exito); }
.cc-acc-rating.bajo { background: var(--rojo); }
.cc-acc-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 14px; margin-top: 14px; }
.cc-acc-statgroup { border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; background: var(--surface-2); }
.cc-acc-statgroup h4 { margin: 0 0 8px; font-size: 11px; font-weight: 800; letter-spacing: 0.07em; text-transform: uppercase; color: var(--ink-3); }
.cc-acc-statrow { display: grid; grid-template-columns: 1fr auto; gap: 4px 10px; align-items: center; padding: 5px 0; border-top: 1px solid var(--border); }
.cc-acc-statrow:first-of-type { border-top: none; }
.cc-acc-statlabel { font-size: 12.5px; color: var(--ink-2); }
.cc-acc-statval { font-size: 13px; font-weight: 700; color: var(--ink); }
.cc-acc-statval em { font-style: normal; color: var(--ink-3); font-weight: 600; font-size: 12px; }
.cc-acc-statbar { grid-column: 1 / -1; height: 5px; border-radius: 3px; background: var(--bar-idle); overflow: hidden; }
.cc-acc-statbar span { display: block; height: 100%; background: var(--rojo); border-radius: 3px; }
.cc-acc-pitch-wrap { width: 100%; max-width: 760px; margin: 0 auto; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 10px; box-shadow: 0 1px 3px rgba(20,20,20,0.05); }
.cc-actionpitch { width: 100%; height: auto; display: block; }
.cc-acc-dir { font-size: 2.6px; fill: #9BB09B; font-weight: 700; letter-spacing: 0.12em; }
.cc-acc-legend { display: flex; flex-wrap: wrap; gap: 9px 18px; justify-content: center; margin-top: 16px; }
.cc-acc-legend-item { display: inline-flex; align-items: center; gap: 8px; font-size: 12.5px; color: var(--ink-2); font-weight: 500; }
.cc-acc-swatch { width: 16px; height: 16px; display: inline-flex; align-items: center; justify-content: center; flex: 0 0 auto; }
.cc-acc-swatch.sh-circle { border-radius: 50%; }
.cc-acc-swatch.sh-square { border-radius: 3px; }
.cc-acc-swatch.sh-tri { background: none !important; clip-path: polygon(50% 0, 100% 100%, 0 100%); width: 15px; height: 14px; }
.cc-acc-swatch.sh-star { background: none !important; clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%); }
.cc-acc-swatch.sh-x { background: none !important; position: relative; }

.cc-acc-swatch.sh-x::before { transform: translate(-50%, -50%) rotate(45deg); }
.cc-acc-swatch.sh-x::after { transform: translate(-50%, -50%) rotate(-45deg); }

.cc-acc-line { width: 22px; height: 2.6px; border-radius: 2px; display: block; }

.cc-reporte-meta { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; font-size: 12.5px; color: var(--ink-2); margin-bottom: 12px; }
.cc-reporte-meta span:first-child { font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
.cc-reporte-cond { display: inline-flex; align-items: center; gap: 6px; }
.cc-reporte-marcador { font-family: var(--font-display); font-size: 46px; font-weight: 700; line-height: 1; }
.cc-reporte-cuerpo { align-items: stretch; grid-template-columns: minmax(340px, 420px) 1fr; }
.cc-reporte-shotmaps, .cc-reporte-metricas { height: 100%; }
.cc-reporte-metricas { display: flex; flex-direction: column; justify-content: center; }
.cc-reporte-metricas > .cc-card-title { align-self: center; text-align: center; }
.cc-acc-chip { font-family: var(--font-ui); }
@media (max-width: 860px) { .cc-reporte-cuerpo { grid-template-columns: 1fr; } }
.cc-shotmap { width: 100%; max-width: 520px; margin: 0 auto; display: block; }
.cc-shot { stroke-width: 0.5; transition: opacity 0.15s; cursor: pointer; }
.cc-shot.gol { fill: var(--rojo); stroke: var(--surface); }
.cc-shot.atajado { fill: var(--accent); stroke: var(--surface); opacity: 0.85; }
.cc-shot.bloqueado { fill: var(--scatter-idle); stroke: var(--surface); opacity: 0.8; }
.cc-shot.fuera { fill: none; stroke: var(--ink-3); stroke-width: 0.7; }
.cc-shot.palo { fill: var(--alerta); stroke: var(--surface); opacity: 0.9; }
.cc-shot.autogol { fill: none; stroke: var(--rojo); stroke-width: 0.8; stroke-dasharray: 1.4 0.9; }
.cc-shot-traza { stroke: var(--rojo); stroke-width: 0.45; stroke-dasharray: 1.6 1.1; opacity: 0.65; }
.cc-shot.palo { fill: var(--alerta); stroke: var(--surface); opacity: 0.9; }
.cc-shot.autogol { fill: var(--visita); stroke: var(--surface); opacity: 0.9; }
.cc-shot-traza { stroke: var(--rojo); stroke-width: 0.45; stroke-dasharray: 1.6 1.1; opacity: 0.55; }
.cc-shot.dim { opacity: 0.14; }
.cc-shot-arco { fill: var(--accent); }
.cc-shot-leyenda { display: flex; gap: 16px; flex-wrap: wrap; font-size: 12px; color: var(--ink-2); margin: 10px 0 6px; align-items: center; }
.cc-shot-leyenda > span { display: flex; align-items: center; gap: 6px; }
.cc-shot-chip { width: 11px; height: 11px; border-radius: 50%; display: inline-block; }
.cc-shot-chip.gol { background: var(--rojo); }
.cc-shot-chip.atajado { background: var(--accent); }
.cc-shot-chip.bloqueado { background: var(--scatter-idle); }
.cc-shot-chip.fuera { background: none; border: 1.6px solid var(--ink-3); }
.cc-shot-chip.palo { background: var(--alerta); }
.cc-shot-chip.palo { background: var(--alerta); }
.cc-shot-nota { margin-left: auto; font-style: italic; color: var(--ink-3); }
.cc-shot-punto { fill: var(--ink-3); }
.cc-shot-upload { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin: 4px 0 8px; }
.cc-upload-btn { position: relative; overflow: hidden; cursor: pointer; }
.cc-upload-btn input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.cc-reporte-torneo { display: inline-flex; align-items: center; gap: 7px; }
.cc-accesos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 8px; }
.cc-acceso {
  display: flex; align-items: center; gap: 9px; padding: 8px 11px;
  background: var(--surface-2); border: 1px solid var(--border); border-radius: 9px;
  font-size: 13px; font-weight: 500; cursor: pointer;
}
.cc-acceso input { accent-color: var(--accent); width: 15px; height: 15px; flex: 0 0 auto; }
.cc-participantes { display: flex; gap: 10px; flex-wrap: wrap; }
.cc-participante {
  display: flex; flex-direction: column; gap: 2px; text-align: left;
  background: var(--surface-2); border: 1.5px solid var(--border); border-radius: 11px;

}

.cc-participante span { font-size: 11.5px; color: var(--ink-2); }
.cc-participante:hover { border-color: var(--ink-3); }
.cc-participante.sel { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }

/* ---------- Campograma v2 ---------- */
.cc-campo-layout-v2 { display: grid; grid-template-columns: minmax(0, 1.1fr) minmax(250px, 0.7fr); gap: var(--gap); align-items: start; }
.cc-campo-layout-v2 .cc-campo-side { grid-column: 1 / -1; }
.cc-plantel-scroll { max-height: 560px; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
.cc-plantel-item {
  display: grid; grid-template-columns: 44px 1fr auto 18px; gap: 9px; align-items: center;
  padding: 8px 10px; border: 1.5px solid var(--border); border-radius: 10px;
  background: var(--surface); cursor: grab; font-size: 13px; transition: border-color 0.12s;
}
.cc-plantel-item:hover { border-color: var(--ink-3); }
.cc-plantel-item.agarrado { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
.cc-plantel-item.en-once { background: var(--surface-2); }
.cc-plantel-pos { font-family: var(--font-display); font-weight: 700; font-size: 12px; color: var(--ink-2); }
.cc-plantel-nombre { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cc-plantel-min { font-size: 11.5px; color: var(--ink-3); }
.cc-campo-jugador circle.over { stroke: var(--rojo); stroke-width: 1.4; }
@media (max-width: 880px) {
  .cc-campo-layout-v2 { grid-template-columns: 1fr; }
}

/* ---------- Tarjetas ---------- */
.cc-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
}
.cc-pad { padding: var(--pad-card); }
.cc-card-title {
  margin: 0 0 6px; font-family: var(--font-display); font-size: 19px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.03em;
}
.cc-card-note { margin: 2px 0 14px; font-size: 12.5px; color: var(--ink-2); }

.cc-page-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
.cc-page-header-left { display: flex; align-items: center; gap: 14px; }
.cc-page-icon {
  width: 46px; height: 46px; border-radius: 12px; background: var(--accent); color: var(--accent-contrast);
  display: flex; align-items: center; justify-content: center; flex: 0 0 auto;
}
.cc-page-title { margin: 0; font-family: var(--font-display); font-size: 25px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.02em; }
.cc-page-subtitle { margin: 2px 0 0; font-size: 13px; color: var(--ink-2); }

/* ---------- Grids ---------- */
.cc-grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--gap); }
.cc-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--gap); }
.cc-grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--gap); }
.cc-grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: var(--gap); }

/* ---------- Tablero de Inicio (Notas + ToDo + Cumpleaños) ---------- */
.cc-board-grid { display: grid; grid-template-columns: 1.6fr 1fr; gap: var(--gap); align-items: start; }
.cc-board-grid.cc-board-solo { grid-template-columns: 1fr; }
.cc-board-side { display: flex; flex-direction: column; gap: var(--gap); }
.cc-notas-count { font-size: 12px; color: var(--ink-3); font-weight: 600; }
.cc-notas-form { display: flex; flex-direction: column; gap: 9px; margin-bottom: 16px; }
.cc-notas-tipos { display: flex; gap: 7px; flex-wrap: wrap; }
.cc-tipo-chip {
  border: 1px solid var(--border); background: var(--surface); color: var(--ink-2);
  border-radius: 999px; padding: 4px 12px; font-size: 11.5px; font-weight: 600; cursor: pointer;
  font-family: var(--font-ui); transition: all 0.15s;
}
.cc-tipo-chip.on { color: #fff; border-color: transparent; }
.cc-tipo-chip.cc-tipo-aviso.on { background: var(--accent); }
.cc-tipo-chip.cc-tipo-urgente.on { background: var(--rojo); }
.cc-tipo-chip.cc-tipo-tactico.on { background: var(--visita); }
.cc-tipo-chip.cc-tipo-reunion.on { background: var(--exito); }
.cc-notas-input {
  width: 100%; border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px;
  font-family: var(--font-ui); font-size: 13.5px; color: var(--ink); background: var(--surface);
  resize: vertical; line-height: 1.5;
}
.cc-notas-input:focus { outline: none; border-color: var(--accent); }
.cc-btn-primario {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px; align-self: flex-start;
  background: var(--accent); color: var(--accent-contrast); border: none; border-radius: 10px;
  padding: 9px 16px; font-family: var(--font-ui); font-size: 13px; font-weight: 600; cursor: pointer;
  transition: opacity 0.15s;
}
.cc-btn-primario:hover { opacity: 0.88; }
.cc-btn-primario:disabled { opacity: 0.4; cursor: not-allowed; }
.cc-notas-lista { display: flex; flex-direction: column; gap: 12px; }
.cc-nota { border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; background: var(--surface-2); }
.cc-nota-head { display: flex; align-items: center; gap: 9px; flex-wrap: wrap; margin-bottom: 6px; }
.cc-tipo-tag { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 2px 8px; border-radius: 999px; color: #fff; }
.cc-tipo-tag.cc-tipo-aviso { background: var(--accent); }
.cc-tipo-tag.cc-tipo-urgente { background: var(--rojo); }
.cc-tipo-tag.cc-tipo-tactico { background: var(--visita); }
.cc-tipo-tag.cc-tipo-reunion { background: var(--exito); }
.cc-nota-autor { font-size: 12.5px; font-weight: 600; color: var(--ink); }
.cc-nota-fecha { font-size: 11.5px; color: var(--ink-3); }
.cc-nota-acciones { margin-left: auto; display: flex; gap: 4px; }
.cc-nota-acciones button { border: none; background: none; color: var(--ink-3); cursor: pointer; padding: 3px; border-radius: 6px; display: inline-flex; }
.cc-nota-acciones button:hover { background: var(--border); color: var(--ink); }
.cc-nota-texto { margin: 0; font-size: 13.5px; line-height: 1.55; color: var(--ink); white-space: pre-wrap; }
.cc-nota-edit { display: flex; flex-direction: column; gap: 8px; }
.cc-nota-edit-btns { display: flex; gap: 8px; }
.cc-todo-editinp { flex: 1; padding: 5px 8px; font-size: 13px; }
/* Muro de avisos: sticky notes */
.cc-notas-wall { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 16px 14px; align-items: start; }
.cc-sticky { position: relative; border: none; border-radius: 2px 10px 10px 10px; padding: 20px 15px 12px; background: #FFF4C2; box-shadow: 0 6px 14px rgba(0,0,0,0.14), 0 1px 0 rgba(0,0,0,0.05); color: #3a3320; }
.cc-sticky.tilt-a { transform: rotate(-1.4deg); }
.cc-sticky.tilt-b { transform: rotate(1.2deg); }
.cc-sticky:hover { transform: rotate(0deg) translateY(-2px); box-shadow: 0 12px 22px rgba(0,0,0,0.2); transition: transform .18s, box-shadow .18s; z-index: 2; }
.cc-sticky-pin { position: absolute; top: -7px; left: 50%; transform: translateX(-50%); width: 14px; height: 14px; border-radius: 50%; background: radial-gradient(circle at 35% 30%, #ff8a8a, #c0261f 70%); box-shadow: 0 2px 3px rgba(0,0,0,0.35); }
.cc-sticky-aviso { background: #FFF4C2; }
.cc-sticky-urgente { background: #FFD5CE; color: #4a1f19; }
.cc-sticky-tactico { background: #CFE8FF; color: #17324a; }
.cc-sticky-reunion { background: #D8F5D2; color: #1f3d1c; }
.cc-sticky .cc-nota-head { margin-bottom: 8px; }
.cc-sticky .cc-nota-texto { color: inherit; font-size: 14px; line-height: 1.5; font-weight: 500; }
.cc-sticky-foot { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-top: 12px; padding-top: 9px; border-top: 1px dashed rgba(0,0,0,0.18); }
.cc-sticky-firma { font-size: 10.5px; font-weight: 700; opacity: 0.7; text-transform: capitalize; }
.cc-like-btn { display: inline-flex; align-items: center; gap: 4px; border: 1px solid rgba(0,0,0,0.2); background: rgba(255,255,255,0.4); color: inherit; border-radius: 999px; padding: 3px 9px; font-size: 12px; font-weight: 800; cursor: pointer; }
.cc-like-btn:hover { background: rgba(255,255,255,0.75); }
.cc-like-btn.on { background: #be1622; border-color: #be1622; color: #fff; }
.cc-like-btn .cc-icon { color: currentColor; }
.cc-like-quien { margin-top: 7px; font-size: 10.5px; line-height: 1.4; opacity: 0.75; text-transform: capitalize; }
.cc-sticky .cc-nota-acciones button { color: rgba(0,0,0,0.45); }
.cc-sticky .cc-nota-acciones button:hover { background: rgba(0,0,0,0.1); color: inherit; }
.cc-sticky .cc-notas-input { background: rgba(255,255,255,0.7); }
.cc-btn-mini { border: 1px solid var(--accent); background: var(--accent); color: var(--accent-contrast); border-radius: 8px; padding: 5px 12px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: var(--font-ui); }
.cc-btn-ghost { background: var(--surface); color: var(--ink-2); border-color: var(--border); }

/* ToDo */
.cc-todo-form { display: flex; gap: 8px; margin-bottom: 12px; }
.cc-input { flex: 1; border: 1px solid var(--border); border-radius: 10px; padding: 9px 12px; font-family: var(--font-ui); font-size: 13px; color: var(--ink); background: var(--surface); }
.cc-input:focus { outline: none; border-color: var(--accent); }
.cc-todo-form .cc-btn-primario { padding: 9px 12px; }
.cc-todo-lista { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 2px; }
.cc-todo-item { display: flex; align-items: center; gap: 10px; padding: 8px 4px; border-bottom: 1px solid var(--border); }
.cc-todo-item:last-child { border-bottom: none; }
.cc-todo-check { flex: 0 0 auto; width: 20px; height: 20px; border: 1.8px solid var(--ink-3); border-radius: 6px; background: var(--surface); cursor: pointer; display: inline-flex; align-items: center; justify-content: center; color: #fff; padding: 0; }
.cc-todo-item.hecho .cc-todo-check { background: var(--exito); border-color: var(--exito); }
.cc-todo-texto { flex: 1; font-size: 13px; color: var(--ink); line-height: 1.4; }
.cc-todo-item.hecho .cc-todo-texto { text-decoration: line-through; color: var(--ink-3); }
.cc-todo-del { flex: 0 0 auto; border: none; background: none; color: var(--ink-3); cursor: pointer; padding: 4px; border-radius: 6px; display: inline-flex; opacity: 0; transition: opacity 0.15s; }
.cc-todo-item:hover .cc-todo-del { opacity: 1; }
.cc-todo-del:hover { color: var(--rojo); background: var(--border); }

/* Cumpleaños */
.cc-cumple-lista { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 2px; }
.cc-cumple-item { display: grid; grid-template-columns: 26px 1fr auto; grid-template-areas: "d nom fec" "d dias edad"; gap: 1px 10px; padding: 8px 4px; border-bottom: 1px solid var(--border); align-items: center; }
.cc-cumple-item:last-child { border-bottom: none; }
.cc-cumple-dorsal { grid-area: d; width: 26px; height: 26px; border-radius: 7px; background: var(--surface-2); border: 1px solid var(--border); display: inline-flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--ink-2); }
.cc-cumple-nombre { grid-area: nom; font-size: 13px; font-weight: 600; color: var(--ink); }
.cc-cumple-fecha { grid-area: fec; font-size: 12px; color: var(--ink-2); text-align: right; }
.cc-cumple-dias { grid-area: dias; font-size: 11.5px; color: var(--ink-3); }
.cc-cumple-edad { grid-area: edad; font-size: 11.5px; color: var(--ink-3); text-align: right; }
.cc-cumple-item.pronto .cc-cumple-dorsal { background: var(--rojo); color: #fff; border-color: var(--rojo); }
.cc-cumple-item.pronto .cc-cumple-dias { color: var(--rojo); font-weight: 600; }
/* Cumpleaños festivo: héroe con torta, globos y confeti */
.cc-cumple-hero { position: relative; display: flex; align-items: center; gap: 14px; padding: 14px 16px; margin-bottom: 12px; border-radius: 14px; overflow: hidden; background: linear-gradient(135deg, #fff3f4, #ffe8ec); border: 1px solid #f5c6cf; }
.cc-cumple-hero.hoy { background: linear-gradient(135deg, #fff0c2, #ffd9e0); border-color: var(--rojo); }
.cc-cumple-hero-torta { font-size: 40px; line-height: 1; filter: drop-shadow(0 3px 4px rgba(0,0,0,0.15)); animation: cumpleBob 2.4s ease-in-out infinite; }
@keyframes cumpleBob { 0%,100% { transform: translateY(0) rotate(-3deg); } 50% { transform: translateY(-5px) rotate(3deg); } }
.cc-cumple-hero-info { display: flex; flex-direction: column; z-index: 1; }
.cc-cumple-hero-quien { font-family: var(--font-display); font-size: 19px; font-weight: 700; color: var(--ink); }
.cc-cumple-hero-cuando { font-size: 12.5px; font-weight: 700; color: var(--rojo); }
.cc-cumple-globos { position: absolute; top: -6px; right: 12px; display: flex; gap: 2px; z-index: 0; opacity: 0.9; }
.cc-cumple-globos .cc-globo { font-size: 26px; animation: cumpleFloat 3s ease-in-out infinite; }
.cc-cumple-globos .g2 { animation-delay: 0.5s; font-size: 30px; }
.cc-cumple-globos .g3 { animation-delay: 1s; }
@keyframes cumpleFloat { 0%,100% { transform: translateY(0) rotate(-4deg); } 50% { transform: translateY(-7px) rotate(4deg); } }
.cc-confeti { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
.cc-confeti span { position: absolute; top: -18px; font-size: 15px; animation: cumpleCae 2.6s linear infinite; }
@keyframes cumpleCae { 0% { transform: translateY(-18px) rotate(0); opacity: 0; } 15% { opacity: 1; } 100% { transform: translateY(140px) rotate(240deg); opacity: 0; } }
@media (prefers-reduced-motion: reduce) { .cc-cumple-hero-torta, .cc-cumple-globos .cc-globo, .cc-confeti span { animation: none; } }

/* ---------- Gestión de Jugadores ---------- */
.cc-filtros-row { display: flex; align-items: flex-end; gap: 18px; flex-wrap: wrap; }
.cc-filtro { display: flex; flex-direction: column; gap: 5px; }
.cc-filtro label { font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-3); }
.cc-filtros-count { margin-left: auto; font-size: 12.5px; color: var(--ink-3); font-weight: 600; }
.cc-gestion-tabla { overflow-x: auto; }
.cc-gestion-tabla table { width: 100%; border-collapse: collapse; font-size: 13px; }
.cc-gestion-tabla th { text-align: left; font-size: 10.5px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-3); font-weight: 600; padding: 10px 12px; border-bottom: 1px solid var(--border); white-space: nowrap; }
.cc-gestion-tabla td { padding: 11px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
.cc-gestion-tabla th.cc-c, .cc-gestion-tabla td.cc-c { text-align: center; }
.cc-gestion-tabla tr:hover td { background: var(--surface-2); }
.cc-dorsal-cell { font-weight: 700; color: var(--ink-2); }
.cc-jug-cell { display: inline-flex; align-items: center; gap: 8px; }
.cc-jug-nom { font-weight: 600; white-space: nowrap; }
.cc-ext-tag { font-size: 9px; font-weight: 700; letter-spacing: 0.05em; background: var(--visita); color: #fff; padding: 1px 5px; border-radius: 4px; }
.cc-pos-mini { display: inline-block; font-size: 11px; font-weight: 700; color: var(--ink-2); background: var(--surface-2); border: 1px solid var(--border); padding: 2px 7px; border-radius: 6px; }
.cc-contrato { display: inline-flex; align-items: center; gap: 5px; font-weight: 600; font-size: 13px; }
.cc-contrato.alerta { color: var(--alerta); }
.cc-contrato-aviso { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; background: color-mix(in srgb, var(--alerta) 16%, transparent); padding: 1px 6px; border-radius: 5px; }
.cc-estado-badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 999px; }

/* ---------- Captación (mapa) ---------- */
.cc-captacion { display: grid; grid-template-columns: 340px 1fr; gap: var(--gap); align-items: start; }
.cc-mapa-wrap { position: relative; height: 760px; margin: 14px 0 6px; }

.cc-mapa-chile svg { height: 100%; width: auto; }
.cc-mapa-labels { position: absolute; inset: 0; pointer-events: none; }
.cc-mapa-label { position: absolute; left: 124px; transform: translateY(-50%); pointer-events: auto; display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; border: none; background: transparent; cursor: pointer; font-family: var(--font-ui); font-size: 11px; font-weight: 600; color: var(--ink-3); padding: 1px 0; line-height: 1.1; }
.cc-mapa-label .cc-mapa-label-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--border); flex: none; box-shadow: -6px 0 0 -2px var(--border); }
.cc-mapa-label:hover { color: var(--ink); }
.cc-mapa-label.on { color: var(--ink); font-weight: 700; }
.cc-mapa-label.on .cc-mapa-label-dot { background: var(--rojo); box-shadow: -6px 0 0 -2px var(--rojo); }
.cc-mapa-label.sel { color: var(--rojo); }
.cc-mapa-label-n { display: inline-flex; align-items: center; justify-content: center; min-width: 16px; height: 16px; padding: 0 4px; border-radius: 8px; background: var(--rojo); color: #fff; font-size: 9.5px; font-weight: 700; margin-left: 2px; }
.cc-heat-legend { display: flex; align-items: center; gap: 8px; margin-top: 4px; font-size: 11px; color: var(--ink-3); }
.cc-heat-legend-label { font-weight: 600; }
.cc-heat-scale { display: flex; gap: 2px; }
.cc-heat-swatch { width: 18px; height: 10px; border-radius: 2px; border: 1px solid var(--border); }
.cc-heat-swatch.s0 { background: var(--bar-idle); }
.cc-heat-swatch.s1 { background: color-mix(in srgb, var(--heat-high) 12%, var(--heat-low)); }
.cc-heat-swatch.s2 { background: color-mix(in srgb, var(--heat-high) 40%, var(--heat-low)); }
.cc-heat-swatch.s3 { background: color-mix(in srgb, var(--heat-high) 70%, var(--heat-low)); }
.cc-heat-swatch.s4 { background: var(--heat-high); }
.cc-heat-ends { display: inline-flex; gap: 56px; }
.cc-mapa-chile .cc-region { fill: var(--bar-idle); stroke: var(--surface); stroke-width: 0.4; transition: fill 0.15s; }
.cc-mapa-chile .cc-region-activa { fill: var(--rojo); }
.cc-mapa-chile .cc-region-activa:hover { filter: brightness(0.88); }
.cc-mapa-chile .cc-region-sel { stroke: var(--ink); stroke-width: 2; }
:root { --heat-low: #f0888c; --heat-high: #5e060b; }
:root[data-mode="oscuro"] { --heat-low: #7a1e24; --heat-high: #ff5a60; }
.cc-mapa-chile .map-chile.s0 { fill: var(--bar-idle); }
.cc-capt-admin { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.cc-capt-admin-label { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 600; color: var(--ink-2); }
.cc-escuelas-head-acc { display: flex; align-items: center; gap: 8px; }
.cc-escuela-right { display: inline-flex; align-items: center; gap: 8px; }
.cc-escuela-edit { border: 1px solid var(--border); background: var(--surface); color: var(--ink-2); border-radius: 7px; width: 26px; height: 26px; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; }
.cc-escuela-edit:hover { border-color: var(--rojo); color: var(--rojo); }
.cc-escuela-contacto { display: flex; flex-wrap: wrap; gap: 14px; font-size: 12px; color: var(--ink-2); margin-top: 7px; padding-top: 7px; border-top: 1px solid var(--border); }
.cc-escuela-contacto span { display: inline-flex; align-items: center; gap: 5px; }
.cc-escuela-contacto .cc-icon { color: var(--ink-3); }
.cc-falta { color: var(--ink-3); font-style: italic; }
.cc-escuela-editor { background: var(--surface); border-color: var(--accent); }
.cc-esc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.cc-esc-campo { display: flex; flex-direction: column; gap: 4px; }

.cc-esc-sub { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; color: var(--ink-3); }

.cc-esc-destacados { margin-top: 9px; padding-top: 9px; border-top: 1px solid var(--border); }

.cc-esc-destacados li { font-size: 12.5px; color: var(--ink); }
.cc-esc-dest-contacto { color: var(--ink-2); font-size: 12px; }
.cc-esc-notas { margin-top: 9px; padding-top: 9px; border-top: 1px solid var(--border); }
.cc-esc-notas p { margin: 5px 0 0; font-size: 12.5px; color: var(--ink-2); line-height: 1.5; white-space: pre-wrap; }
.cc-esc-block { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }

/* Resumen de la red de escuelas */

.cc-scout-head-id { display: flex; gap: 12px; align-items: flex-start; }

.cc-tm-prev-nota { font-size: 11px; color: var(--ink-3); margin-left: auto; }
.cc-tm-link-row { display: flex; gap: 8px; align-items: stretch; }

.cc-tm-fetch { width: auto; white-space: nowrap; padding: 0 14px; }
.cc-tm-msg { display: flex; align-items: center; gap: 6px; font-size: 12px; margin: 10px 0 2px; }
.cc-tm-ok { color: var(--exito); }
.cc-tm-ok .cc-icon { color: var(--exito); }
.cc-tm-err { color: var(--rojo); }
.cc-tm-err .cc-icon { color: var(--rojo); }
/* Scouting · notas multiusuario */
.cc-scout-notas { margin-top: 12px; border-top: 1px solid var(--border); padding-top: 12px; }

.cc-scout-nota-head { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; font-size: 11.5px; }

.cc-scout-nota-fecha { color: var(--ink-3); }
.cc-scout-nota-txt { margin: 0; font-size: 13px; color: var(--ink-2); line-height: 1.5; white-space: pre-wrap; }
.cc-scout-nota-form { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
.cc-scout-nota-form textarea { width: 100%; }
/* Mercado · agentes, editor, videos */
.cc-agente-btn { display: inline-flex; align-items: center; gap: 5px; border: 1px solid var(--border); background: var(--surface); color: var(--ink); border-radius: 8px; padding: 3px 9px; font-size: 12.5px; font-family: var(--font-ui); font-weight: 600; cursor: pointer; }
.cc-agente-btn:hover { border-color: var(--accent); }

.cc-mercado-extra { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 10px; }
.cc-mercado-informe { width: 100%; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
.cc-mercado-informe p { margin: 5px 0 0; font-size: 12.5px; color: var(--ink-2); line-height: 1.5; white-space: pre-wrap; }
.cc-mercado-pie { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border); }
.cc-rep-notas { flex-direction: column; align-items: flex-start; gap: 4px; }

.cc-cat-acciones { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-bottom: 8px; }
.cc-cat-regiones { display: flex; flex-direction: column; gap: 10px; margin: 14px 0; }
.cc-cat-region { display: flex; align-items: center; justify-content: space-between; gap: 14px; padding: 12px 14px; border: 1px solid var(--border); border-radius: 12px; background: var(--surface-2); }

/* Configuración: intro por fuente + estado Sofascore */
.cc-config-intro { border-left: 3px solid var(--rojo); }
.cc-sofa-estado { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 10px 0 6px; }

.cc-sofa-estado span { font-size: 11px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: var(--ink-3); }

@media (max-width: 900px) { .cc-sofa-estado { grid-template-columns: 1fr; } }
/* ---------- Campograma profesional ---------- */
.cc-cg-controls { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: var(--gap); }

.cc-cg-pitch { position: relative; width: 100%; aspect-ratio: 68 / 100; background: linear-gradient(180deg, #1f8049, #1b6f40); border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.15); }

.cc-cg-reco-block { margin-top: 12px; }

.cc-chip-row { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 9px; }

/* GPS: aceleraciones vs desaceleraciones */

.cc-valor { color: var(--ink); font-weight: 700; }

.cc-repr-btn { border: 1px solid var(--border); background: var(--surface); color: var(--ink-2); border-radius: 8px; padding: 5px 10px; font-size: 12.5px; font-family: var(--font-ui); cursor: pointer; max-width: 170px; text-align: left; }

.cc-modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; width: 560px; max-width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: 0 24px 60px rgba(0,0,0,0.3); }

.cc-rep-info { padding: 16px 20px; display: flex; flex-direction: column; gap: 2px; }

.cc-region-chip { border: 1px solid var(--border); background: var(--surface-2); color: var(--ink-2); border-radius: 999px; padding: 5px 12px; font-size: 12px; font-weight: 600; cursor: pointer; font-family: var(--font-ui); transition: all 0.15s; }

.cc-escuelas-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }

/* ---------- Mercado (ofrecidos / para ofrecer) ---------- */
.cc-mercado-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: var(--gap); }
.cc-mercado-card { border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; background: var(--surface); display: flex; flex-direction: column; gap: 10px; }

/* ---------- Stats ---------- */

}

}

.cc-btn-primary {

}

/* ---------- Tablas ---------- */

}

}

/* ---------- Pills / leyendas ---------- */
.cc-pill {

}
.cc-pill-v { background: color-mix(in oklab, var(--exito) 12%, transparent); color: var(--exito); }
.cc-pill-e { background: color-mix(in oklab, var(--alerta) 14%, transparent); color: var(--alerta); }
.cc-pill-d { background: color-mix(in oklab, var(--rojo) 12%, transparent); color: var(--rojo); }

.cc-legend { display: flex; gap: 16px; font-size: 12.5px; color: var(--ink-2); font-weight: 500; flex-wrap: wrap; }
.cc-legend > span { display: flex; align-items: center; gap: 7px; }
.cc-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; flex: 0 0 auto; }

.cc-dot.d { background: var(--rojo); } .cc-dot.pend { background: var(--bar-idle); }

/* ---------- Gráficos ---------- */

.cc-chart { width: 100%; height: auto; display: block; }

.cc-tooltip {
  position: absolute; top: 8px; right: 8px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px;

}

.cc-radar-center { display: flex; justify-content: center; }

.cc-radar-stat { display: flex; justify-content: space-between; gap: 10px; font-size: 13px; padding: 7px 0; border-bottom: 1px dashed var(--border); }
.cc-radar-stat span { color: var(--ink-2); }

/* Barras horizontales */
.cc-barsh { display: flex; flex-direction: column; gap: 7px; }
.cc-barsh-row { display: grid; grid-template-columns: 26px 180px 1fr 64px; align-items: center; gap: 12px; }

.cc-barsh-label { font-size: 13px; font-weight: 500; white-space: nowrap; display: flex; align-items: center; gap: 8px; }
.cc-barsh-logo { width: 20px; height: 20px; object-fit: contain; flex: 0 0 auto; }
.cc-barsh-label.hot, .cc-barsh-val.hot { font-weight: 700; }
.cc-barsh-track { height: 16px; background: var(--surface-2); border-radius: 5px; overflow: hidden; }
.cc-barsh-fill { height: 100%; border-radius: 5px; transition: width 0.4s ease; }
.cc-barsh-val { font-family: var(--font-display); font-weight: 600; font-size: 15px; text-align: right; }

/* Barras agrupadas */
.cc-barsgroup { display: flex; flex-direction: column; gap: 16px; }
.cc-barsgroup-row { display: grid; grid-template-columns: 190px 1fr; gap: 16px; align-items: center; }
.cc-barsgroup-label { font-size: 13px; font-weight: 600; color: var(--ink-2); text-align: right; }
.cc-barsgroup-bars { display: flex; flex-direction: column; gap: 5px; }
.cc-barsgroup-bar { display: grid; grid-template-columns: 1fr 58px; gap: 10px; align-items: center; }

/* ---------- Inicio ---------- */

.cc-welcome p { margin: 4px 0 0; color: var(--ink-2); font-size: 13.5px; }
.cc-welcome-meta { font-style: italic; font-size: 12.5px !important; color: var(--ink-3) !important; }
.cc-matches { display: flex; flex-direction: column; }
.cc-match-row {
  display: flex; align-items: center; gap: 14px; padding: 12px 2px;
  border-bottom: 1px solid var(--border); flex-wrap: wrap;
}
.cc-match-row:last-child { border-bottom: none; }
.cc-match-fecha { display: flex; align-items: center; gap: 7px; font-size: 12.5px; color: var(--ink-2); min-width: 150px; }
.cc-match-rival { display: flex; align-items: center; gap: 9px; font-size: 13.5px; flex: 1; }

.cc-localia {

  font-family: var(--font-display); font-size: 12px; font-weight: 700;
}
.cc-localia.l { background: color-mix(in oklab, var(--exito) 14%, transparent); color: var(--exito); }
.cc-localia.v { background: color-mix(in oklab, var(--visita) 13%, transparent); color: var(--visita); }
.cc-localia.mini { width: 18px; height: 18px; border-radius: 5px; }
.cc-club-card { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 4px; }
.cc-club-nombre { margin: 14px 0 0; font-family: var(--font-display); font-size: 28px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }
.cc-club-liga { margin: 0; color: var(--ink-2); font-size: 13px; }
.cc-club-meta { display: flex; gap: 8px; font-size: 12.5px; color: var(--ink-3); margin-top: 8px; }
.cc-club-estadio { margin: 4px 0 0; font-size: 12px; color: var(--ink-3); }
.cc-results-strip { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
.cc-result-chip {
  display: flex; flex-direction: column; gap: 5px; padding: 12px;
  background: var(--surface-2); border: 1px solid var(--border); border-radius: 11px;

<style id="cc-modern-css">
/* ===========================================================
   Modernización global de la capa visual compartida
   (afecta TODAS las páginas sin cambiar su función)
   =========================================================== */

/* Tarjetas: elevación sutil + hover */
.cc-card {
  box-shadow: 0 1px 2px rgba(20, 20, 20, 0.04), 0 2px 8px rgba(20, 20, 20, 0.04);
  transition: box-shadow 0.2s ease, transform 0.2s ease, border-color 0.2s ease;
}
.cc-card.cc-pad:hover { box-shadow: 0 2px 6px rgba(20, 20, 20, 0.06), 0 8px 24px rgba(20, 20, 20, 0.07); }

/* Título de tarjeta con marca de acento */
.cc-card-title { position: relative; padding-left: 13px; }
.cc-card-title::before {
  content: ""; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
  width: 4px; height: 0.85em; border-radius: 3px; background: var(--rojo);
}

/* Encabezado de página más moderno: panel con barra de acento */
.cc-page-header {
  background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
  padding: 18px 22px; position: relative; overflow: hidden;
  box-shadow: 0 1px 2px rgba(20, 20, 20, 0.04), 0 2px 8px rgba(20, 20, 20, 0.04);
}
.cc-page-header::before {
  content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--rojo);
}
.cc-page-icon {
  border-radius: 14px; background: #141414;
  box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
  position: relative;
}
.cc-resumen-roja .cc-page-icon { background: var(--rojo); }
.cc-page-title { font-size: 24px; }

/* Stat cards: borde superior de acento al pasar el cursor */
.cc-stat {
  position: relative; overflow: hidden;
  box-shadow: 0 1px 2px rgba(20, 20, 20, 0.04), 0 2px 8px rgba(20, 20, 20, 0.035);
  transition: box-shadow 0.2s ease, transform 0.2s ease;
}
.cc-stat::after {
  content: ""; position: absolute; left: 0; right: 0; top: 0; height: 3px;
  background: var(--rojo); transform: scaleX(0); transform-origin: left;
  transition: transform 0.25s ease;
}
.cc-stat:hover { box-shadow: 0 2px 6px rgba(20, 20, 20, 0.06), 0 10px 26px rgba(20, 20, 20, 0.07); transform: translateY(-1px); }
.cc-stat:hover::after { transform: scaleX(1); }
.cc-stat-accent::after, .cc-stat-v::after { background: var(--accent-contrast); }
.cc-stat-value { font-size: 32px; letter-spacing: -0.01em; }

/* Barra de filtros: panel agrupado con fondo tenue */
.cc-filters {
  background: var(--surface-2); border-color: var(--border);
  border-radius: 14px; padding: 16px 18px;
}
.cc-filters.cc-pad { padding: 16px 18px; }
.cc-select, .cc-input { border-radius: 10px; transition: border-color 0.15s, box-shadow 0.15s; }
.cc-select:focus, .cc-input:focus { box-shadow: 0 0 0 3px color-mix(in oklab, var(--rojo) 14%, transparent); border-color: var(--rojo); }

/* Segmented tabs y botones: micro-sombra */
.cc-segtabs { box-shadow: 0 1px 2px rgba(20, 20, 20, 0.04); }
.cc-segtab.active { box-shadow: 0 1px 4px rgba(20, 20, 20, 0.18); }
.cc-btn-primary { transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease; box-shadow: 0 2px 8px rgba(20, 20, 20, 0.16); }
.cc-btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(20, 20, 20, 0.22); opacity: 1; }

/* Tablas: hover de fila + cabecera más limpia */
.cc-table th { background: var(--surface-2); border-bottom: 2px solid var(--border); }
.cc-table tbody tr { transition: background 0.12s ease; }
.cc-table tbody tr:hover:not(.hot) td { background: var(--surface-2); }
.cc-team-badge { box-shadow: 0 1px 2px rgba(20, 20, 20, 0.04); }

/* Tooltip de gráficos: más suave */
.cc-tooltip { border-radius: 12px; box-shadow: 0 10px 30px rgba(20, 20, 20, 0.14); }

@media (max-width: 880px) {
  .cc-page-header { padding: 14px 16px; }
  .cc-filters { padding: 14px; }
}
/* ---------- Switch de idioma ES/EN ---------- */
.cc-lang-switch { display: inline-flex; border: 1px solid var(--border); border-radius: 9px; overflow: hidden; background: var(--surface-2); }
.cc-lang-opt { border: none; background: transparent; color: var(--ink-2); font-family: var(--font-ui); font-weight: 700; font-size: 12px; letter-spacing: 0.04em; padding: 6px 10px; cursor: pointer; line-height: 1; }
.cc-lang-opt:hover { color: var(--ink); }
:root[data-cc-lang="es"] .cc-lang-opt[data-lang="es"],
:root[data-cc-lang="en"] .cc-lang-opt[data-lang="en"] { background: var(--rojo); color: #fff; }
/* Solo durante la captura de mockups (clase cap-mode): evita que el título
   envuelva con la fuente de respaldo y se solape con el subtítulo. */
body.cap-mode .cc-page-title { font-size: 20px !important; line-height: 1.16 !important; white-space: nowrap !important; }
body.cap-mode .cc-page-subtitle { margin-top: 5px !important; white-space: nowrap !important; }
body.cap-mode .cc-topbar-title { max-width: none !important; }
body.cap-mode .cc-topbar-title h1 { font-size: 19px !important; white-space: nowrap !important; overflow: visible !important; text-overflow: clip !important; }
</style>
